  <style>
    #ducksStartup{position:fixed;inset:0;z-index:20000;background:#061528;display:grid;place-items:center;overflow:hidden;opacity:1;visibility:visible;transition:opacity .35s ease,visibility .35s ease}
    #ducksStartup.is-hidden{opacity:0;visibility:hidden;pointer-events:none}
    #ducksStartup video{width:100%;height:100%;object-fit:cover;display:block;background:#061528}
    #ducksStartup::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(6,21,40,.06),rgba(6,21,40,.18));pointer-events:none}
    #ducksStartup .startup-brand{position:absolute;left:50%;bottom:max(26px,env(safe-area-inset-bottom));transform:translateX(-50%);z-index:2;color:#fff;font:800 clamp(15px,3.6vw,22px)/1.2 Arial,sans-serif;letter-spacing:.2px;text-align:center;text-shadow:0 2px 10px rgba(0,0,0,.45);white-space:nowrap}
    @media (prefers-reduced-motion:reduce){#ducksStartup video{display:none}#ducksStartup{background:#0b4d38 url('assets/ducks-startup-poster-v285.webp') center/cover no-repeat}}
  </style>

<body>

  <div id="ducksStartup" aria-label="Abriendo Ducks Basketball Academy">
    <video id="ducksStartupVideo" autoplay muted playsinline preload="metadata" poster="assets/ducks-startup-poster-v285.webp">
      <source src="assets/ducks-startup-v285.mp4" type="video/mp4">
    </video>
    <div class="startup-brand">Ducks Basketball Academy</div>
  </div>
  <div id="app"></div>
  <div id="toast" class="toast"></div>
  <script src="app.js?v=2.85.0"></script>

<script>
(function(){
  const splash=document.getElementById('ducksStartup');
  const video=document.getElementById('ducksStartupVideo');
  const started=performance.now();
  let closed=false;
  function closeSplash(){
    if(closed||!splash)return;
    const wait=Math.max(0,900-(performance.now()-started));
    setTimeout(()=>{
      if(closed)return; closed=true; splash.classList.add('is-hidden');
      setTimeout(()=>splash.remove(),450);
    },wait);
  }
  const app=document.getElementById('app');
  const observer=new MutationObserver(()=>{if(app&&app.children.length){observer.disconnect();closeSplash();}});
  if(app) observer.observe(app,{childList:true,subtree:false});
  window.addEventListener('load',()=>setTimeout(closeSplash,350),{once:true});
  setTimeout(closeSplash,4200);
  if(video){
    video.addEventListener('ended',closeSplash,{once:true});
    video.play().catch(()=>{});
  }
})();
</script>

<script>
  window.deferredDucksInstallPrompt = null;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    window.deferredDucksInstallPrompt = e;
    document.dispatchEvent(new CustomEvent('ducks-pwa-ready'));
  });
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js', { scope: './' }).catch(() => {});
    });
  }
</script>

</body>
